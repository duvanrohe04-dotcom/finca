<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finca la Rosita – Iniciar Sesión</title>
    <link rel="icon" href="{{ url_for('static', filename='img/logo.jpg', v=2) }}">
    <link rel="manifest" href="{{ url_for('manifest') }}">
    <meta name="theme-color" content="#5c8a3c">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo.jpg', v=2) }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=30) }}">
</head>
<body class="login-body">
    <div class="login-bg">
        <div class="login-overlay"></div>
        
        <!-- Llave para abrir el login -->
        <button id="toggleLogin" class="login-key-btn" aria-label="Abrir Login">
            <span class="key-icon">🔑</span>
        </button>

        <div class="login-scene">
            <div class="login-card" id="loginCard">
                <div class="login-brand">
                    <img class="login-logo" src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo">
                    <h1 class="login-title">Finca la Rosita</h1>
                    <p class="login-subtitle">Panel de Acceso</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
                    <div class="form-group">
                        <input type="text" name="username" placeholder="Usuario" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" placeholder="Contraseña" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
                </form>
            </div>
        </div>
        <div id="flashCheck" data-has-flash="{% if get_flashed_messages() %}1{% else %}0{% endif %}"></div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js', v=30) }}"></script>
    <script>
        document.getElementById('toggleLogin').addEventListener('click', function() {
            const card = document.getElementById('loginCard');
            card.classList.toggle('visible');
            this.classList.toggle('active');
        });

        // Mostrar por defecto si hay mensajes de error
        if (document.getElementById('flashCheck').dataset.hasFlash === '1') {
            document.getElementById('loginCard').classList.add('visible');
            document.getElementById('toggleLogin').classList.add('active');
        }
    </script>
</body>
</html>
