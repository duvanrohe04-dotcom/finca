<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión – Finca Admin</title>
    <link rel="icon" href="{{ url_for('static', filename='img/logo.jpg') }}">
    <link rel="manifest" href="{{ url_for('manifest') }}">
    <meta name="theme-color" content="#5c8a3c">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=3) }}">
</head>
<body class="login-body">
    <div class="login-bg">
        <div class="login-overlay"></div>
        <div class="login-scene">
        <div class="login-card">
            <div class="login-brand">
                <img class="login-logo" src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo">
                <h1 class="login-title">Finca Admin</h1>
                <p class="login-subtitle">Panel de Administración</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
        </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js', v=3) }}"></script>
</body>
</html>
