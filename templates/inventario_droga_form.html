{% extends 'base.html' %}
{% block title %}Finca la Rosita{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">💊 {{ 'Editar Medicamento' if item else 'Agregar Medicamento' }}</h1>
    <a href="{{ url_for('inventario.index') }}" class="btn-secondary">← Volver</a>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Nombre del Medicamento *</label>
                <input type="text" name="nombre" value="{{ item.nombre if item else '' }}" required placeholder="Ej: Ivermectina, Vitamina ADE">
            </div>
            <div class="form-group">
                <label>Marca / Laboratorio</label>
                <input type="text" name="marca" value="{{ item.marca if item else '' }}" placeholder="Ej: Bayer, MSD">
            </div>
            <div class="form-group">
                <label>Unidad</label>
                <select name="unidad">
                    {% for u in ['frasco', 'ampolla', 'caja', 'sobre', 'litro', 'ml', 'unidad'] %}
                    <option value="{{ u }}" {{ 'selected' if item and item.unidad == u }}>{{ u.capitalize() }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Precio Unitario ($)</label>
                <input type="number" step="0.01" name="precio_unitario" value="{{ item.precio_unitario if item else 0 }}" min="0" id="precio">
            </div>
            <div class="form-group">
                <label>Cantidad</label>
                <input type="number" name="cantidad" value="{{ item.cantidad if item else 0 }}" min="0" id="cantidad">
            </div>
            <div class="form-group">
                <label>Total Estimado</label>
                <div class="total-preview-field" id="total-field">$0</div>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">💾 {{ 'Actualizar' if item else 'Agregar' }}</button>
            <a href="{{ url_for('inventario.index') }}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
<script>
function updateTotal() {
    const p = parseFloat(document.getElementById('precio').value) || 0;
    const c = parseInt(document.getElementById('cantidad').value) || 0;
    document.getElementById('total-field').textContent = '$' + (p * c).toLocaleString('es-CO');
}
document.getElementById('precio').addEventListener('input', updateTotal);
document.getElementById('cantidad').addEventListener('input', updateTotal);
updateTotal();
</script>
{% endblock %}
