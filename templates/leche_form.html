{% extends 'base.html' %}
{% block title %}{{ 'Editar' if registro else 'Nuevo' }} Registro Leche – Finca Admin{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">🥛 {{ 'Editar Registro' if registro else 'Nuevo Registro de Leche' }}</h1>
    <a href="{{ url_for('leche.index') }}" class="btn-secondary">← Volver</a>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Fecha *</label>
                <input type="date" name="fecha" value="{{ hoy }}" required>
            </div>
            <div class="form-group">
                <label>Precio por Litro ($)</label>
                <input type="number" step="0.01" name="precio_litro" value="{{ registro.precio_litro if registro else 0 }}" min="0" id="precio">
            </div>
            <div class="form-group">
                <label>Litros Mañana</label>
                <input type="number" step="0.1" name="litros_manana" value="{{ registro.litros_manana if registro else 0 }}" min="0" id="manana">
            </div>
            <div class="form-group">
                <label>Litros Tarde</label>
                <input type="number" step="0.1" name="litros_tarde" value="{{ registro.litros_tarde if registro else 0 }}" min="0" id="tarde">
            </div>
            <div class="form-group">
                <label>Total Litros</label>
                <div class="total-preview-field" id="total-litros">0L</div>
            </div>
            <div class="form-group">
                <label>Total Ingresos</label>
                <div class="total-preview-field" id="total-dinero">$0</div>
            </div>
            <div class="form-group full-width">
                <label>Observaciones</label>
                <textarea name="observaciones" rows="3" placeholder="Notas del día...">{{ registro.observaciones if registro else '' }}</textarea>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">💾 {{ 'Actualizar' if registro else 'Guardar Registro' }}</button>
            <a href="{{ url_for('leche.index') }}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
<script>
function updateTotals() {
    const m = parseFloat(document.getElementById('manana').value) || 0;
    const t = parseFloat(document.getElementById('tarde').value) || 0;
    const p = parseFloat(document.getElementById('precio').value) || 0;
    const total = m + t;
    document.getElementById('total-litros').textContent = total.toFixed(1) + 'L';
    document.getElementById('total-dinero').textContent = '$' + (total * p).toLocaleString('es-CO');
}
['manana','tarde','precio'].forEach(id => document.getElementById(id).addEventListener('input', updateTotals));
updateTotals();
</script>
{% endblock %}
