version: '3.8'

services:
  web:
    build: .
    container_name: finca_app
    expose:
      - "${APP_PORT:-5001}"
    volumes:
      - .:/app
      - /app/.venv
      - /app/__pycache__
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_APP=${FLASK_APP:-run.py}
    networks:
      - coolify
    restart: unless-stopped

networks:
  coolify:
    external: true
